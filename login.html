<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hand Hygiene Portal</title>
    <style>
        /* --- Inline CSS --- */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #5a67d8;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        #loginMessage {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Enter your email" required>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <p id="loginMessage"></p>
    </div>

    <script>
        // Demo user credentials (plain text for demo purposes)
        const demoUser = {
            email: "student@gmail.com",
            password: "password123"
        };

        // Check if already logged in
        if(localStorage.getItem('loggedIn') === 'true') {
            window.location.href = "index.html";
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(email === demoUser.email) {
                if(password === demoUser.password) {
                    // Store login status in localStorage
                    localStorage.setItem('loggedIn', 'true');
                    window.location.href = "index.html";
                } else {
                    document.getElementById('loginMessage').textContent = "Incorrect password!";
                }
            } else {
                document.getElementById('loginMessage').textContent = "User not found!";
            }
        });
    </script>
</body>
</html>
